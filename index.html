<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wielki Turniej Kuponów</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #d4a373;
            --bg-color: #fefae0;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-dark: #606c38;
            --accent: #bc6c25;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #fefae0 0%, #faedcd 100%);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        header { text-align: center; margin-bottom: 30px; }
        h1 { font-family: 'Playfair Display', serif; color: var(--accent); font-size: 2.2rem; margin-bottom: 10px; }
        .step-info { font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: #a98467; margin-bottom: 20px; }

        .game-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 800px;
            justify-content: center;
            perspective: 1000px;
        }

        .coupon-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 2px solid white;
            border-radius: 25px;
            padding: 40px 20px;
            width: 300px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .coupon-card:hover {
            transform: scale(1.05);
            border-color: var(--accent);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .vs {
            align-self: center;
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: bold;
            font-style: italic;
            color: var(--accent);
        }

        .icon { font-size: 4rem; margin-bottom: 20px; }
        h3 { font-family: 'Playfair Display', serif; margin-bottom: 15px; font-size: 1.5rem; }
        p { font-size: 0.9rem; line-height: 1.5; color: #555; }

        /* Final Winner Style */
        .winner-screen {
            display: none;
            text-align: center;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .winner-card {
            background: white;
            padding: 50px;
            border-radius: 30px;
            border: 4px solid var(--accent);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        @media (max-width: 650px) {
            .game-container { flex-direction: column; align-items: center; }
            .vs { margin: 10px 0; }
        }
    </style>
</head>
<body>

    <div id="game-ui">
        <header>
            <div class="step-info" id="progress">Runda 1 / 5</div>
            <h1>Który kupon wybierasz?</h1>
        </header>

        <div class="game-container">
            <div id="card-left" class="coupon-card" onclick="select(0)">
                </div>
            
            <div class="vs">vs</div>

            <div id="card-right" class="coupon-card" onclick="select(1)">
                </div>
        </div>
    </div>

    <div id="winner-ui" class="winner-screen">
        <header>
            <p class="step-info">Mamy zwycięzcę!</p>
            <h1>Twój główny prezent na dziś to:</h1>
        </header>
        <div id="final-card-container" class="winner-card">
            </div>
        <p style="margin-top: 30px; font-style: italic;">Zrób screena i wyślij mi go teraz! ❤️</p>
    </div>

    <script>
        const allCoupons = [
            { title: "Masaż stóp", icon: "💆‍♀️", desc: "30 minut relaksu przy Twojej ulubionej muzyce." },
            { title: "Domowa Kolacja", icon: "🍝", desc: "Twoje ulubione danie, świece i zero Twojego sprzątania." },
            { title: "Weekend Wolności", icon: "🧹", desc: "Przejmuję wszystkie domowe obowiązki przez cały weekend." },
            { title: "Wieczór w Kinie", icon: "🍿", desc: "Wybierasz dowolny film, nawet jeśli to najdłuższy romans." },
            { title: "Dzień na TAK", icon: "✅", desc: "Przez całe 24 godziny nie mogę Ci odmówić niczego!" },
            { title: "Spacer i Deser", icon: "🍰", desc: "Wyjście do ulubionej kawiarni na największe ciastko w menu." }
        ];
        
        let pool = [...allCoupons].sort(() => Math.random() - 0.5);
        let currentWinner = pool[0];
        let nextIndex = 1;
        let totalRounds = allCoupons.length - 1;
        let currentRound = 1;
        
        function init() {
            // Sprawdź, czy już grała
            const savedWinner = localStorage.getItem('celebratedWinner');
            if (savedWinner) {
                const winnerData = allCoupons.find(c => c.title === savedWinner);
                showWinner(winnerData, false); // Pokaż ekran końcowy bez ponownego wysyłania do Google
            } else {
                updateUI();
            }
        }
        
        function updateUI() {
            if (currentRound > totalRounds) {
                showWinner(currentWinner, true); // Pierwsza wygrana - wyślij do Google
                return;
            }
        
            document.getElementById('progress').innerText = `Pojedynek ${currentRound} / ${totalRounds}`;
            const nextChallenger = pool[nextIndex];
        
            renderCard('card-left', currentWinner);
            renderCard('card-right', nextChallenger);
        }
        
        function renderCard(elementId, data) {
            const el = document.getElementById(elementId);
            el.style.opacity = 0;
            setTimeout(() => {
                el.innerHTML = `
                    <div class="icon">${data.icon}</div>
                    <h3>${data.title}</h3>
                    <p>${data.desc}</p>
                `;
                el.style.opacity = 1;
            }, 200);
        }
        
        function select(side) {
            if (side === 1) currentWinner = pool[nextIndex];
            nextIndex++;
            currentRound++;
            
            confetti({
                particleCount: 40,
                spread: 50,
                origin: { y: 0.8 },
                colors: ['#bc6c25', '#fefae0']
            });
        
            updateUI();
        }
        
        function showWinner(winner, shouldSubmit) {
            document.getElementById('game-ui').style.display = 'none';
            const winnerUI = document.getElementById('winner-ui');
            winnerUI.style.display = 'block';
            
            document.getElementById('final-card-container').innerHTML = `
                <div class="icon" style="font-size: 6rem;">${winner.icon}</div>
                <h2 style="font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 10px;">${winner.title}</h2>
                <p style="font-size: 1.2rem;">${winner.desc}</p>
            `;
        
            if (shouldSubmit) {
                // Zapisz w przeglądarce, żeby nie mogła zagrać drugi raz
                localStorage.setItem('celebratedWinner', winner.title);
        
                // Wyślij do Google Sheets (pamiętaj o podpięciu URL!)
                const scriptURL = "https://script.google.com/macros/s/AKfycbzpMsKWbwTRj8ORU_zy74_gbvRk-0sobOv6CEhz8cQ/dev"; 
                fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prezent: winner.title })
                });
            }
        
            // Wielkie konfetti
            const duration = 4 * 1000;
            const end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#bc6c25', '#d4a373'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#bc6c25', '#d4a373'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
        
        // Start gry
        init();
    </script>
</body>
</html>
